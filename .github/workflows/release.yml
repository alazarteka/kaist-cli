name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build standalone binary
        run: |
          pyinstaller \
            --name kaist \
            --onefile \
            --console \
            --clean \
            --paths src \
            --hidden-import playwright.async_api \
            --hidden-import playwright.sync_api \
            --collect-submodules playwright \
            --collect-data playwright \
            scripts/pyinstaller_entrypoint.py

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          scripts/build_release_bundle.sh \
            --binary dist/kaist \
            --version "${TAG}" \
            --target "${{ matrix.target }}" \
            --out-dir dist

      - name: Upload packaged bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/kaist-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged bundles
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 kaist-*.tar.gz > checksums.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kaist-${{ github.ref_name }}-darwin-arm64.tar.gz
            dist/kaist-${{ github.ref_name }}-darwin-x86_64.tar.gz
            dist/checksums.txt
